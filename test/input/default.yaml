params:
  Nv: 2 # Number of virtual fermions on each bond
  seed: 2347816 # Random seed

lattice:
  Lx: 101 # System size in x-direction
  Ly: 101 # System size in y-direction

hamiltonian:
  ht: 1.0 # Hoping amplitude
  DeltaX: 0.5 # d-wave paring amplitude in x-direction
  DeltaY: -0.5 # d-wave paring amplitude in y-direction
  delta: 0.10 # density of holes
  Mu: 0.0 # chemical potential
  solve_mu_from_delta: true # whether to solve chemical potential from hole density

file:
  LoadFile: "./data/default.h5" # Load initial T from this file, if it exists
  # LoadFile: ""
  WriteFile: "./data/data.h5" # Write information about final Gaussian fPEPS to this file
  SaveEachSteps: false

optimizer:
  MaxIter: 100
  gtol: 1E-7 # gtol for optimizer

backend: cpu